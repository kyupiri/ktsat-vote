<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 해커톤 투표</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DA;
    --text-primary: #1A1A18;
    --text-secondary: #6B6B67;
    --text-muted: #9E9E99;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #0F6E56;
    --teal-mid: #5DCAA5;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --gold: #EF9F27;
    --silver: #B4B2A9;
    --bronze: #F0997B;
  }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .topbar-logo span { color: var(--teal); }
  .topbar-status { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width: 980px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .hero { margin-bottom: 2rem; }
  .hero-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
  .hero h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 8px; }
  .hero p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  .selector-wrap { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .selector-wrap label { font-size: 14px; color: var(--text-secondary); white-space: nowrap; }
  .selector-wrap select { flex: 1; min-width: 160px; font-size: 14px; font-family: inherit; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-primary); cursor: pointer; outline: none; }
  .btn-reset { font-size: 13px; color: var(--text-muted); background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; text-underline-offset: 2px; padding: 0; display: none; }
  .btn-reset:hover { color: var(--coral); }

  .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
  @media(max-width:720px){ .main-grid { grid-template-columns: 1fr; } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 1.25rem; }

  .vote-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .team-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 12px; background: var(--surface); cursor: pointer; transition: all 0.15s; user-select: none; position: relative; }
  .team-card:hover:not(.self):not(.voted-state) { border-color: var(--teal-mid); background: var(--teal-light); transform: translateY(-1px); }
  .team-card.selected { border: 2px solid var(--teal); background: var(--teal-light); }
  .team-card.self { opacity: 0.35; cursor: not-allowed; background: var(--bg); }
  .team-card.voted-state { cursor: default; }
  .team-card .tnum { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .team-card.selected .tnum { color: var(--teal-dark); }
  .team-card .tname { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .team-card.selected .tname { color: var(--teal-dark); }
  .team-card .tvotes { font-size: 13px; color: var(--text-muted); }
  .team-card.selected .tvotes { color: var(--teal); font-weight: 500; }
  .check-icon { position: absolute; top: 10px; right: 10px; width: 20px; height: 20px; border-radius: 50%; background: var(--teal); display: none; align-items: center; justify-content: center; }
  .team-card.selected .check-icon { display: flex; }
  .check-icon svg { width: 11px; height: 11px; stroke: white; fill: none; stroke-width: 2.5; }
  .self-label { position: absolute; bottom: 8px; right: 8px; font-size: 9px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }

  .notice { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; display: none; }
  .notice.warn { background: var(--coral-light); color: var(--coral); }
  .notice.ok { background: var(--teal-light); color: var(--teal-dark); }

  .submit-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .sel-info { font-size: 13px; color: var(--text-secondary); }
  .sel-info strong { color: var(--text-primary); font-weight: 700; }
  .btn-vote { padding: 10px 24px; border-radius: 8px; border: none; background: var(--teal); color: white; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn-vote:hover:not(:disabled) { background: var(--teal-dark); transform: translateY(-1px); }
  .btn-vote:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .result-panel { position: sticky; top: 72px; }
  .total-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--teal-light); color: var(--teal-dark); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; margin-bottom: 1rem; }
  .result-list { display: flex; flex-direction: column; gap: 10px; }
  .result-row { display: flex; align-items: center; gap: 8px; }
  .r-rank { font-size: 16px; width: 26px; text-align: center; flex-shrink: 0; }
  .r-rank.num { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .r-name { font-size: 13px; font-weight: 500; width: 48px; flex-shrink: 0; }
  .r-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 18px; overflow: hidden; }
  .r-bar { height: 100%; border-radius: 4px; background: var(--teal-mid); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .r-bar.r1 { background: var(--gold); }
  .r-bar.r2 { background: var(--silver); }
  .r-bar.r3 { background: var(--bronze); }
  .r-cnt { font-size: 13px; font-weight: 600; color: var(--text-secondary); width: 24px; text-align: right; flex-shrink: 0; }
  .result-footer { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }

  .voted-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--teal); color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-left: 10px; vertical-align: middle; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Firebase 연결 중...</div>
</div>

<div class="topbar">
  <div class="topbar-logo">AI <span>해커톤</span> 투표</div>
  <div class="topbar-status">
    <div class="live-dot"></div>
    <span id="statusText">실시간 연결 중</span>
  </div>
</div>

<div class="container">
  <div class="hero">
    <div class="hero-eyebrow">Peer Voting · 실시간</div>
    <h1>팀 간 투표 <span id="votedChip" style="display:none" class="voted-chip">✓ 투표 완료</span></h1>
    <p>자기 팀을 제외한 팀 중 <strong>2~3팀</strong>을 선택해 투표하세요.</p>
  </div>

  <div class="selector-wrap">
    <label for="myTeam">우리 팀</label>
    <select id="myTeam">
      <option value="">-- 팀을 선택하세요 --</option>
    </select>
    <button class="btn-reset" id="resetBtn" onclick="resetVote()">투표 초기화</button>
  </div>

  <div class="main-grid">
    <div>
      <div class="card">
        <div class="card-title">투표할 팀 선택 (2~3팀)</div>
        <div class="notice" id="notice"></div>
        <div class="vote-grid" id="voteGrid"></div>
        <div class="submit-row">
          <div class="sel-info"><strong id="selNum">0</strong> / 2~3표 선택</div>
          <button class="btn-vote" id="submitBtn" disabled onclick="submitVote()">투표하기 →</button>
        </div>
      </div>
    </div>

    <div class="result-panel">
      <div class="card">
        <div class="total-badge">🔴 실시간 집계</div>
        <div class="card-title">현재 순위</div>
        <div class="result-list" id="resultList"></div>
        <div class="result-footer">
          총 <span id="totalVotes">0</span>표 &nbsp;·&nbsp; <span id="votedTeamsCount">0</span>/10팀 투표 완료
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, runTransaction, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCYxpi_3lfFQ0Flg8h4PrYltefQGcUDiAE",
    authDomain: "ktsat-vote.firebaseapp.com",
    databaseURL: "https://ktsat-vote-default-rtdb.firebaseio.com",
    projectId: "ktsat-vote",
    storageBucket: "ktsat-vote.firebasestorage.app",
    messagingSenderId: "628500046974",
    appId: "1:628500046974:web:82a4d2682b38bd62d1e42f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const TEAMS = Array.from({length: 10}, (_, i) => `팀 ${i+1}`);
  let votes = Object.fromEntries(TEAMS.map(t => [t, 0]));
  let votedLog = {};
  let myTeam = '';
  let selected = [];
  let hasVoted = false;

  const myTeamSel = document.getElementById('myTeam');
  const voteGrid = document.getElementById('voteGrid');
  const submitBtn = document.getElementById('submitBtn');
  const notice = document.getElementById('notice');
  const resetBtn = document.getElementById('resetBtn');
  const votedChip = document.getElementById('votedChip');
  const statusText = document.getElementById('statusText');

  TEAMS.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    myTeamSel.appendChild(opt);
  });

  async function initDB() {
    const votesSnap = await get(ref(db, 'votes'));
    if (!votesSnap.exists()) {
      const init = Object.fromEntries(TEAMS.map(t => [t.replace(' ','_'), 0]));
      await set(ref(db, 'votes'), init);
    }
  }

  onValue(ref(db, 'votes'), (snap) => {
    if (snap.exists()) {
      const raw = snap.val();
      TEAMS.forEach(t => {
        const key = t.replace(' ', '_');
        votes[t] = raw[key] || 0;
      });
      renderGrid();
      renderResults();
    }
    document.getElementById('loadingOverlay').style.display = 'none';
    statusText.textContent = '실시간 연결됨';
  });

  onValue(ref(db, 'votedTeams'), (snap) => {
    votedLog = snap.exists() ? snap.val() : {};
    renderResults();
  });

  myTeamSel.addEventListener('change', () => {
    myTeam = myTeamSel.value;
    selected = [];
    const myKey = myTeam.replace(' ', '_');
    hasVoted = !!(myTeam && votedLog[myKey]);
    if (hasVoted) {
      votedChip.style.display = 'inline-flex';
      resetBtn.style.display = 'inline';
      const prev = votedLog[myKey] || [];
      selected = Array.isArray(prev) ? prev : [];
    } else {
      votedChip.style.display = 'none';
      resetBtn.style.display = 'none';
    }
    hideNotice();
    renderGrid();
    updateSubmit();
  });

  function renderGrid() {
    voteGrid.innerHTML = '';
    TEAMS.forEach((team, i) => {
      const isSelf = team === myTeam && myTeam !== '';
      const isSelected = selected.includes(team);
      const card = document.createElement('div');
      card.className = 'team-card' + (isSelf?' self':'') + (isSelected?' selected':'') + (hasVoted?' voted-state':'');
      card.innerHTML = `
        <div class="tnum">TEAM ${String(i+1).padStart(2,'0')}</div>
        <div class="tname">${team}</div>
        <div class="tvotes">${votes[team]}표</div>
        <div class="check-icon"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg></div>
        ${isSelf ? '<div class="self-label">OUR TEAM</div>' : ''}
      `;
      if (!isSelf && myTeam && !hasVoted) {
        card.addEventListener('click', () => toggleSelect(team));
      }
      voteGrid.appendChild(card);
    });
  }

  function toggleSelect(team) {
    if (selected.includes(team)) {
      selected = selected.filter(t => t !== team);
      hideNotice();
    } else {
      if (selected.length >= 3) { showNotice('최대 3팀까지만 선택할 수 있어요.', 'warn'); return; }
      selected.push(team);
      hideNotice();
    }
    renderGrid();
    updateSubmit();
  }

  function updateSubmit() {
    const n = selected.length;
    document.getElementById('selNum').textContent = n;
    submitBtn.disabled = !(n >= 2 && n <= 3) || !myTeam || hasVoted;
  }

  async function submitVote() {
    if (selected.length < 2 || selected.length > 3 || !myTeam || hasVoted) return;
    submitBtn.disabled = true;
    submitBtn.textContent = '저장 중...';
    try {
      for (const team of selected) {
        const key = team.replace(' ', '_');
        await runTransaction(ref(db, `votes/${key}`), (cur) => (cur || 0) + 1);
      }
      const myKey = myTeam.replace(' ', '_');
      await set(ref(db, `votedTeams/${myKey}`), selected);
      hasVoted = true;
      votedChip.style.display = 'inline-flex';
      resetBtn.style.display = 'inline';
      showNotice(`${myTeam} 투표 완료! (${selected.join(', ')})`, 'ok');
      renderGrid();
      updateSubmit();
    } catch(e) {
      showNotice('저장 중 오류가 발생했어요. 다시 시도해주세요.', 'warn');
      submitBtn.disabled = false;
    }
    submitBtn.textContent = '투표하기 →';
  }

  async function resetVote() {
    if (!myTeam || !hasVoted) return;
    if (!confirm(`${myTeam}의 투표를 초기화할까요?`)) return;
    try {
      const myKey = myTeam.replace(' ', '_');
      const prev = votedLog[myKey] || [];
      const prevList = Array.isArray(prev) ? prev : [];
      for (const team of prevList) {
        const key = team.replace(' ', '_');
        await runTransaction(ref(db, `votes/${key}`), (cur) => Math.max((cur || 0) - 1, 0));
      }
      await set(ref(db, `votedTeams/${myKey}`), null);
      hasVoted = false;
      selected = [];
      votedChip.style.display = 'none';
      resetBtn.style.display = 'none';
      hideNotice();
      renderGrid();
      updateSubmit();
    } catch(e) {
      showNotice('초기화 중 오류가 발생했어요.', 'warn');
    }
  }

  window.resetVote = resetVote;

  function renderResults() {
    const sorted = TEAMS.slice().sort((a, b) => votes[b] - votes[a]);
    const max = Math.max(...TEAMS.map(t => votes[t]), 1);
    const list = document.getElementById('resultList');
    list.innerHTML = '';
    const total = TEAMS.reduce((s, t) => s + votes[t], 0);
    document.getElementById('totalVotes').textContent = total;
    document.getElementById('votedTeamsCount').textContent = Object.keys(votedLog).length;
    sorted.forEach((team, i) => {
      const emoji = i===0?'🥇':i===1?'🥈':i===2?'🥉':null;
      const barClass = i===0?'r1':i===1?'r2':i===2?'r3':'';
      const pct = Math.round((votes[team] / max) * 100);
      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <div class="r-rank ${emoji?'':'num'}">${emoji||(i+1)}</div>
        <div class="r-name">${team}</div>
        <div class="r-bar-wrap"><div class="r-bar ${barClass}" style="width:${pct}%"></div></div>
        <div class="r-cnt">${votes[team]}</div>
      `;
      list.appendChild(row);
    });
  }

  initDB();
  renderGrid();
  renderResults();
</script>
</body>
</html>
